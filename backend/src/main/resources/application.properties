spring.application.name=pu-exam-routine

# Database settings used by legacy Controller/DatabaseConnector
app.db.url=${DB_URL:jdbc:mysql://localhost:3306/}
app.db.name=${DB_NAME:puroutine}
app.db.user=${DB_USER:root}
app.db.pass=${DB_PASS:root}

# Run headless (no Swing/AWT display required)
java.awt.headless=true

# Scheduler settings (can be overridden per request)
scheduler.min-gap=${SCHEDULER_MIN_GAP:1}
scheduler.max-gap=${SCHEDULER_MAX_GAP:3}

server.port=8080
